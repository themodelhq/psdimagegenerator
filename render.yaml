services:
  - type: web
    name: psd-image-generator-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: (apt-get install -y fonts-comic-neue || true) && npm install -g pnpm@10.4.1 && pnpm install --no-frozen-lockfile && pnpm run build:server
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Supabase S3-compatible storage
      - key: AWS_ACCESS_KEY_ID
        value: 4959c91315e32ec4922d2623d57761d5
      - key: AWS_SECRET_ACCESS_KEY
        value: 9cd0f1b242a405221de62867eafd93e07f888c0ae468e56d19e6c6539e4c7018
      - key: AWS_REGION
        value: eu-west-1
      - key: S3_BUCKET_NAME
        value: hostimage
      - key: S3_ENDPOINT
        value: https://pivpvwqynlbdcjryuzwy.storage.supabase.co/storage/v1/s3
